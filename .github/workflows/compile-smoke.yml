name: Java Compile Smoke Test

on:
  pull_request:
  workflow_dispatch:

jobs:
  compile-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run compile smoke test
        run: ./scripts/compile_smoke.sh
